# 复制为 config.yaml 后按本机填写。凭据不在这里 —— 用环境变量:
#   export ZINIAO_COMPANY=你的企业名
#   export ZINIAO_USERNAME=你的用户名
#   export ZINIAO_PASSWORD=你的密码
browser:
  # mac v6 客户端:通常是 "ziniao",或 /Applications/ziniao.app
  client_path: ziniao
  # 备用 chromedriver 目录(若店铺内核自带 webdriver 则用不到)
  webdriver_path: ./webdriver
  # 本机未被占用的端口
  socket_port: 16851
